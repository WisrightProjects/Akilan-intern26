<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Clean Code & Debugging Playground</title>

<style>
    body{
        font-family: Arial, sans-serif;
        max-width: 900px;
        margin: 20px auto;
        padding:20px;
        background:#f5f5f5;
    }

    h1{
        color:#333;
    }

    section{
        background:white;
        padding:15px;
        margin-bottom:20px;
        border-radius:10px;
        box-shadow:0 0 5px rgba(0,0,0,0.1);
    }

    button{
        padding:10px 15px;
        margin:5px;
        cursor:pointer;
    }

    #output{
        background:black;
        color:lime;
        padding:15px;
        min-height:150px;
        white-space:pre-wrap;
        border-radius:8px;
    }
</style>
</head>
<body>

<h1>JavaScript Clean Code & Debugging Playground</h1>

<section>
    <button onclick="showUser()">Show User</button>
    <button onclick="calculate()">Calculate</button>
    <button onclick="causeError()">Cause Error</button>
    <button onclick="fetchPost()">Fetch API</button>
    <button onclick="validateInput()">Validate Input</button>
    <button onclick="clearOutput()">Clear Output</button>
</section>

<section>
    <h3>Output</h3>
    <div id="output"></div>
</section>

<script>

// =========================
// Helper Function
// =========================

function clearOutput(){
    document.getElementById("output").textContent = "";
}

function print(message){
    document.getElementById("output").textContent += message + "\n";
    console.log(message);
}

// =========================
// Clean Code Example
// =========================

const user = {
    name: "Akilan",
    age: 22,
    address: {
        city: "Coimbatore"
    }
};

function showUser(){
    print("=== User Information ===");

    // Optional chaining
    print(`Name: ${user?.name}`);
    print(`City: ${user?.address?.city ?? "Unknown"}`);

    console.table(user);
}

// =========================
// Small Functions
// =========================

function add(a,b){
    return a+b;
}

function calculate(){
    console.time("Calculation");

    const result = add(10,20);

    console.timeEnd("Calculation");

    print(`10 + 20 = ${result}`);
}

// =========================
// Common Error Example
// =========================

function causeError(){

    try{

        const obj = null;

        // TypeError
        console.log(obj.name);

    }
    catch(error){

        print("Caught Error:");
        print(error.message);

        console.error(error);

    }
    finally{

        print("finally block executed");

    }

}

// =========================
// Custom Error Class
// =========================

class ValidationError extends Error{

    constructor(message){

        super(message);

        this.name = "ValidationError";
    }

}

// =========================
// Input Validation
// =========================

function validateName(name){

    if(typeof name !== "string"){

        throw new ValidationError(
            "Name must be a string"
        );

    }

    return true;
}

function validateInput(){

    try{

        validateName(100);

    }
    catch(error){

        if(error instanceof ValidationError){

            print("Validation Error:");
            print(error.message);

        }
        else{

            print(error.message);

        }

    }

}

// =========================
// Async Error Handling
// =========================

async function fetchPost(){

    try{

        print("Fetching data...");

        const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts/1"
        );

        if(!response.ok){

            throw new Error(
                "Request failed"
            );

        }

        const data = await response.json();

        console.table(data);

        print("Post Title:");
        print(data.title);

    }
    catch(error){

        print("Fetch Error:");
        print(error.message);

    }

}

// =========================
// Debugger Example
// =========================

function multiply(a,b){

    debugger; // Open DevTools and click button to pause

    return a*b;
}

console.group("App Started");

console.log("JavaScript Playground Loaded");

console.groupEnd();

</script>

</body>
</html>
