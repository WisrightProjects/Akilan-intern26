<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2980b9, #6dd5fa, #ffffff);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            padding: 35px 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            color: #fff;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 22px;
            letter-spacing: 0.5px;
        }

        .search {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .search button {
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            background: #1c5d99;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .search button:hover {
            background: #144166;
        }

        .message {
            margin-top: 16px;
            font-size: 0.95rem;
            min-height: 20px;
            opacity: 0.9;
        }

        .result {
            margin-top: 24px;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .city-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .country {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-bottom: 14px;
        }

        .icon {
            font-size: 4.5rem;
            margin: 6px 0;
        }

        .temp {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .desc {
            font-size: 1.05rem;
            margin-top: 6px;
            text-transform: capitalize;
        }

        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
        }

        .detail-item span {
            display: block;
        }

        .detail-item .label {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .detail-item .value {
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌤️ Weather App</h1>

        <div class="search">
            <input type="text" id="cityInput" placeholder="Enter a city name..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div class="message" id="message">Type a city and press Search.</div>

        <div class="result" id="result">
            <div class="city-name" id="cityName"></div>
            <div class="country" id="country"></div>
            <div class="icon" id="icon"></div>
            <div class="temp" id="temp"></div>
            <div class="desc" id="desc"></div>

            <div class="details">
                <div class="detail-item">
                    <span class="label">Feels Like</span>
                    <span class="value" id="feels"></span>
                </div>
                <div class="detail-item">
                    <span class="label">Humidity</span>
                    <span class="value" id="humidity"></span>
                </div>
                <div class="detail-item">
                    <span class="label">Wind</span>
                    <span class="value" id="wind"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const message = document.getElementById('message');
        const result = document.getElementById('result');

        // Map WMO weather codes -> { description, emoji }
        const weatherCodes = {
            0:  ['Clear sky', '☀️'],
            1:  ['Mainly clear', '🌤️'],
            2:  ['Partly cloudy', '⛅'],
            3:  ['Overcast', '☁️'],
            45: ['Fog', '🌫️'],
            48: ['Depositing rime fog', '🌫️'],
            51: ['Light drizzle', '🌦️'],
            53: ['Moderate drizzle', '🌦️'],
            55: ['Dense drizzle', '🌧️'],
            61: ['Slight rain', '🌦️'],
            63: ['Moderate rain', '🌧️'],
            65: ['Heavy rain', '🌧️'],
            66: ['Freezing rain', '🌧️'],
            67: ['Heavy freezing rain', '🌧️'],
            71: ['Slight snow', '🌨️'],
            73: ['Moderate snow', '❄️'],
            75: ['Heavy snow', '❄️'],
            77: ['Snow grains', '🌨️'],
            80: ['Rain showers', '🌦️'],
            81: ['Moderate rain showers', '🌧️'],
            82: ['Violent rain showers', '⛈️'],
            85: ['Snow showers', '🌨️'],
            86: ['Heavy snow showers', '❄️'],
            95: ['Thunderstorm', '⛈️'],
            96: ['Thunderstorm w/ hail', '⛈️'],
            99: ['Thunderstorm w/ heavy hail', '⛈️']
        };

        async function getWeather(city) {
            if (!city.trim()) {
                message.textContent = 'Please enter a city name.';
                result.classList.remove('show');
                return;
            }

            message.textContent = 'Searching...';
            result.classList.remove('show');

            try {
                // 1) Geocode the city name to coordinates
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
                const geoRes = await fetch(geoUrl);
                const geoData = await geoRes.json();

                if (!geoData.results || geoData.results.length === 0) {
                    message.textContent = `Could not find "${city}". Try another city.`;
                    return;
                }

                const place = geoData.results[0];
                const { latitude, longitude, name, country } = place;

                // 2) Fetch current weather for those coordinates
                const wxUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m`;
                const wxRes = await fetch(wxUrl);
                const wxData = await wxRes.json();
                const cur = wxData.current;

                const [desc, emoji] = weatherCodes[cur.weather_code] || ['Unknown', '🌡️'];

                // 3) Render
                document.getElementById('cityName').textContent = name;
                document.getElementById('country').textContent = country || '';
                document.getElementById('icon').textContent = emoji;
                document.getElementById('temp').textContent = `${Math.round(cur.temperature_2m)}°C`;
                document.getElementById('desc').textContent = desc;
                document.getElementById('feels').textContent = `${Math.round(cur.apparent_temperature)}°C`;
                document.getElementById('humidity').textContent = `${cur.relative_humidity_2m}%`;
                document.getElementById('wind').textContent = `${Math.round(cur.wind_speed_10m)} km/h`;

                message.textContent = '';
                result.classList.add('show');
            } catch (err) {
                message.textContent = 'Something went wrong. Check your connection and try again.';
                console.error(err);
            }
        }

        searchBtn.addEventListener('click', () => getWeather(cityInput.value));
        cityInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') getWeather(cityInput.value);
        });
    </script>
</body>
</html>
