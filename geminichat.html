<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraChat & Admin Portal</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --online-color: #22c55e;
            --offline-color: #64748b;
            --admin-accent: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Views State Engine */
        .view-panel {
            display: none;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.3s ease-in-out;
        }

        .view-panel.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Auth Screen Styling */
        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--panel-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            margin: auto;
            text-align: center;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .auth-switch {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-switch span {
            color: var(--accent-primary);
            cursor: pointer;
            font-weight: 600;
        }

        /* Application Main Interface Grid */
        .app-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            background: #111827;
            border-right: 1px solid #1f2937;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .profile-title {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-main);
        }

        .logout-btn {
            background: #374151;
            color: #f3f4f6;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
        }

        .logout-btn:hover {
            background: #4b5563;
        }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem;
        }

        .contact-card {
            display: flex;
            align-items: center;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.4rem;
            border: 1px solid transparent;
        }

        .contact-card:hover {
            background: #1f2937;
        }

        .contact-card.active {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .avatar {
            width: 44px;
            height: 44px;
            background: #374151;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            position: relative;
            margin-right: 0.85rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #111827;
            position: absolute;
            bottom: 1px;
            right: 1px;
        }

        .status-dot.online { background-color: var(--online-color); }
        .status-dot.offline { background-color: var(--offline-color); }

        .contact-info {
            flex: 1;
        }

        .contact-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.2rem;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Chat Core Workspace Layout */
        .chat-area {
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-blank-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem;
        }

        .chat-blank-state h3 {
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
        }

        .chat-header {
            padding: 1.2rem 2rem;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            max-width: 65%;
            padding: 0.85rem 1.1rem;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
            animation: messageSlide 0.2s ease-out;
        }

        @keyframes messageSlide {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message-bubble.incoming {
            background: #334155;
            color: var(--text-main);
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message-bubble.outgoing {
            background: var(--accent-primary);
            color: white;
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .message-timestamp {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            margin-top: 0.4rem;
            text-align: right;
            display: block;
        }

        .message-bubble.incoming .message-timestamp {
            color: var(--text-muted);
        }

        .chat-input-row {
            padding: 1.2rem 2rem;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .chat-input-row input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.9rem 1.2rem;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 0.95rem;
        }

        .chat-input-row input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .send-btn {
            background: var(--accent-primary);
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.2s;
            flex-shrink: 0;
        }
