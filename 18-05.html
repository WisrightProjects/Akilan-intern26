<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
background: #020024;
background: linear-gradient(90deg, rgba(2, 0, 36, 1) 0%, rgba(9, 9, 121, 1) 7%, rgba(0, 212, 255, 1) 90%);      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container{
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .input-box{
      display: flex;
      gap: 10px;
    }

    .input-box input{
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    .input-box button{
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .input-box button:hover{
      background: #0056b3;
    }

    ul{
      list-style: none;
      margin-top: 20px;
    }

    li{
      background: #eee;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li.completed{
      text-decoration: line-through;
      background: #c8f7c5;
      color: #555;
    }

    .btn-group{
      display: flex;
      gap: 5px;
    }

    .complete-btn{
      background: green;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .delete-btn{
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Todo App</h1>

    <div class="input-box">
      <input type="text" id="todoInput" placeholder="Enter todo">
      <button onclick="addTodo()">Add</button>
    </div>

    <ul id="todoList"></ul>
  </div>

  <script>

    const todoInput = document.getElementById("todoInput");
    const todoList = document.getElementById("todoList");

    function addTodo() {

      const task = todoInput.value.trim();

      if(task === ""){
        alert("Please enter a task");
        return;
      }

      const li = document.createElement("li");

      li.innerHTML = `
        <span>${task}</span>

        <div class="btn-group">
          <button class="complete-btn" onclick="completeTodo(this)">
            Done
          </button>

          <button class="delete-btn" onclick="deleteTodo(this)">
            Delete
          </button>
        </div>
      `;

      todoList.appendChild(li);

      todoInput.value = "";
    }

    function completeTodo(button){
      const li = button.parentElement.parentElement;
      li.classList.toggle("completed");
    }

    function deleteTodo(button){
      const li = button.parentElement.parentElement;
      li.remove();
    }

  </script>

</body>
</html>
